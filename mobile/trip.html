<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Trip Timeline — Smart T&amp;E</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="../assets/css/shared.css">
<style>
  body { background:var(--bg);padding:20px 0; }
  .notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:30px;background:var(--bg);border-radius:0 0 20px 20px;z-index:10;}
  .m-topbar{display:flex;align-items:center;gap:10px;padding:56px 16px 12px;}
  .m-back{width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:18px;cursor:pointer;text-decoration:none;}

  #trip-map { height:200px;width:100%; }

  .trip-stats {
    display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
    margin:10px 16px;
  }
  .trip-stat {
    background:var(--card);border:1px solid var(--border);border-radius:10px;
    padding:10px 6px;text-align:center;
  }
  .trip-stat-val { font-size:15px;font-weight:800; }
  .trip-stat-lbl { font-size:9px;color:var(--text-muted);margin-top:2px; }

  /* Timeline */
  .timeline { padding:0 16px;margin-bottom:16px; }
  .tl-item {
    display:flex;gap:14px;position:relative;padding-bottom:4px;
  }
  .tl-left {
    display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;
  }
  .tl-dot {
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;flex-shrink:0;z-index:1;
  }
  .tl-line {
    width:2px;flex:1;min-height:20px;
    background:var(--border);margin-top:4px;
  }
  .tl-line.active { background:linear-gradient(180deg,var(--accent),var(--border)); }
  .tl-content {
    flex:1;padding-bottom:16px;
  }
  .tl-time { font-size:10px;color:var(--text-muted);margin-bottom:4px; }
  .tl-card {
    background:var(--card);border:1px solid var(--border);
    border-radius:12px;padding:12px;
  }
  .tl-card.highlight { border-color:rgba(0,212,170,0.4);background:rgba(0,212,170,0.05); }
  .tl-card.flag { border-color:rgba(245,158,11,0.4);background:rgba(245,158,11,0.05); }
  .tl-card.violation { border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.05); }
  .tl-title { font-size:13px;font-weight:700;margin-bottom:4px; }
  .tl-sub { font-size:11px;color:var(--text-muted); }
  .tl-amount { font-size:14px;font-weight:700;color:var(--accent);float:right; }
  .km-tag { display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted);margin-top:4px; }
</style>
</head>
<body>

<div style="text-align:center;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:12px;">
  <button class="icon-btn" id="theme-toggle"><i class="ri-moon-line"></i></button>
  <span style="font-size:13px;color:var(--text-muted);">Daily Trip Timeline</span>
</div>

<div class="mobile-preview-wrap" style="padding-top:0;">
  <div class="mobile-frame">
    <div class="notch"></div>
    <div class="mobile-status-bar">
      <span>9:41</span>
      <div style="display:flex;align-items:center;gap:6px;"><i class="ri-signal-wifi-fill"></i><i class="ri-battery-fill" style="color:var(--accent);"></i></div>
    </div>

    <div style="flex:1;overflow-y:auto;background:var(--bg);">
      <!-- Top Bar -->
      <div class="m-topbar">
        <a class="m-back" href="home.html"><i class="ri-arrow-left-line"></i></a>
        <div style="flex:1;">
          <div style="font-size:16px;font-weight:700;">Today's Journey</div>
          <div style="font-size:11px;color:var(--text-muted);">Mon, 16 Mar 2026</div>
        </div>
        <input type="date" value="2026-03-16" style="font-size:11px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 8px;color:var(--text);outline:none;">
      </div>

      <!-- Map -->
      <div id="trip-map"></div>

      <!-- Stats -->
      <div class="trip-stats">
        <div class="trip-stat">
          <div class="trip-stat-val" style="color:var(--accent);">48.2</div>
          <div class="trip-stat-lbl">km GPS</div>
        </div>
        <div class="trip-stat">
          <div class="trip-stat-val">9h 43m</div>
          <div class="trip-stat-lbl">Duration</div>
        </div>
        <div class="trip-stat">
          <div class="trip-stat-val">3</div>
          <div class="trip-stat-lbl">Visits</div>
        </div>
        <div class="trip-stat">
          <div class="trip-stat-val" style="color:var(--accent);">₹1,110</div>
          <div class="trip-stat-lbl">Total</div>
        </div>
      </div>

      <!-- Reimbursement summary -->
      <div style="margin:0 16px 14px;background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.3);border-radius:12px;padding:12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div style="font-size:11px;color:var(--text-muted);">Estimated Reimbursement</div>
            <div style="font-size:22px;font-weight:800;color:var(--accent);">₹ 1,110</div>
          </div>
          <div style="text-align:right;">
            <span class="badge badge-green"><i class="ri-robot-line"></i> 5 Auto</span><br>
            <span class="badge badge-amber" style="margin-top:4px;"><i class="ri-flag-line"></i> 1 Flagged</span>
          </div>
        </div>
      </div>

      <!-- Timeline -->
      <div style="padding:0 16px;margin-bottom:8px;">
        <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;">Journey Timeline</div>
      </div>
      <div class="timeline" id="timeline">
        <!-- Populated by JS -->
      </div>
    </div>

    <div class="mobile-nav-bar">
      <a class="mobile-nav-item" href="home.html"><i class="ri-home-4-line"></i><span>Home</span></a>
      <a class="mobile-nav-item active" href="trip.html"><i class="ri-route-fill"></i><span>Journey</span></a>
      <a class="mobile-nav-item" href="expense.html"><i class="ri-camera-line"></i><span>Expense</span></a>
      <a class="mobile-nav-item" href="history.html"><i class="ri-history-line"></i><span>History</span></a>
      <button class="mobile-nav-item" style="color:var(--red);" onclick="Auth.logout()"><i class="ri-logout-box-r-line"></i><span>Logout</span></button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../assets/js/shared.js"></script>
<script>
// Map
const map = L.map('trip-map', {zoomControl:false,dragging:false,scrollWheelZoom:false}).setView([19.165, 72.935], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OSM'}).addTo(map);
const path = [[19.1136,72.8697],[19.1280,72.8820],[19.1420,72.9000],[19.1500,72.9150],[19.1650,72.9300],[19.1800,72.9500],[19.1900,72.9600],[19.2050,72.9700],[19.2183,72.9781]];
L.polyline(path, {color:'#00d4aa',weight:3,opacity:0.8}).addTo(map);
// pins
const pinData = [
  { lat:19.1136,lng:72.8697,color:'#8b5cf6',label:'S' },
  { lat:19.1310,lng:72.8860,color:'#3b82f6',label:'1' },
  { lat:19.1700,lng:72.9350,color:'#3b82f6',label:'2' },
  { lat:19.2000,lng:72.9650,color:'#3b82f6',label:'3' },
  { lat:19.2183,lng:72.9781,color:'#8b5cf6',label:'E' },
  { lat:19.1290,lng:72.8830,color:'#00d4aa',label:'₹' },
  { lat:19.2450,lng:73.0100,color:'#f59e0b',label:'⚠' },
];
pinData.forEach(p => {
  const icon = L.divIcon({className:'',html:`<div style="background:${p.color};border:2px solid #fff;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700;">${p.label}</div>`,iconSize:[16,16],iconAnchor:[8,8]});
  L.marker([p.lat,p.lng],{icon}).addTo(map);
});

// Timeline data
const events = [
  { time:'9:02 AM', type:'attendance', dot:'#8b5cf6', label:'Clock In', title:'Attendance Marked', sub:'Andheri East, Mumbai · GPS pinned', card:'highlight', extra:'' },
  { time:'9:15 AM', type:'travel', dot:'#00d4aa', label:'🚗', title:'En Route', sub:'GPS tracking active · 2-Wheeler', card:'', extra:'<div class="km-tag"><i class="ri-route-line"></i> 12.3 km tracked so far</div>' },
  { time:'10:30 AM', type:'activity', dot:'#3b82f6', label:'📍', title:'Client Visit · Zomato HQ', sub:'Andheri East · 45 min meeting', card:'', extra:'<span class="badge badge-green" style="font-size:10px;">Proof captured</span>' },
  { time:'1:18 PM', type:'expense', dot:'#00d4aa', label:'₹', title:'Lunch Bill · Café Mumbai Express', sub:'OCR: ₹280 · Vendor verified', card:'highlight', extra:'<span class="badge badge-green" style="font-size:10px;"><i class="ri-robot-line"></i> Auto-Approved</span><span style="font-size:14px;font-weight:700;color:var(--accent);float:right;">₹280</span>' },
  { time:'2:00 PM', type:'activity', dot:'#3b82f6', label:'📍', title:'Client Visit · Meesho Office', sub:'Santacruz · 50 min meeting', card:'', extra:'<span class="badge badge-green" style="font-size:10px;">Proof captured</span>' },
  { time:'3:20 PM', type:'expense', dot:'#00d4aa', label:'₹', title:'Toll · Western Express Highway', sub:'OCR: ₹60 · Route verified', card:'highlight', extra:'<span class="badge badge-green" style="font-size:10px;"><i class="ri-robot-line"></i> Auto-Approved</span><span style="font-size:14px;font-weight:700;color:var(--accent);float:right;">₹60</span>' },
  { time:'4:30 PM', type:'activity', dot:'#3b82f6', label:'📍', title:'Client Visit · Nykaa, Thane', sub:'Thane West · 40 min meeting', card:'', extra:'<span class="badge badge-green" style="font-size:10px;">Proof captured</span>' },
  { time:'5:00 PM', type:'expense', dot:'#00d4aa', label:'₹', title:'Evening Snacks', sub:'OCR: ₹350 · Near activity pin', card:'highlight', extra:'<span class="badge badge-green" style="font-size:10px;"><i class="ri-robot-line"></i> Auto-Approved</span><span style="font-size:14px;font-weight:700;color:var(--accent);float:right;">₹350</span>' },
  { time:'7:30 PM', type:'expense', dot:'#f59e0b', label:'⚠', title:'Dinner Bill (Flagged)', sub:'5.2 km from nearest activity', card:'flag', extra:'<span class="badge badge-amber" style="font-size:10px;"><i class="ri-flag-line"></i> Needs Justification</span><span style="font-size:14px;font-weight:700;color:var(--amber);float:right;">₹420</span>' },
  { time:'6:45 PM', type:'attendance', dot:'#8b5cf6', label:'🏁', title:'Clock Out', sub:'Thane · 48.2 km total · Auto-TA ₹420', card:'highlight', extra:'<span class="badge badge-green" style="font-size:10px;"><i class="ri-robot-line"></i> TA Auto-Approved</span>' },
];

const tl = document.getElementById('timeline');
const iconMap = { attendance:'ri-map-pin-2-fill', travel:'ri-car-line', activity:'ri-user-location-line', expense:'ri-receipt-line' };
const colorMap = { attendance:'#8b5cf6', travel:'#00d4aa', activity:'#3b82f6', expense:'#00d4aa' };
events.forEach((ev, i) => {
  const isLast = i === events.length - 1;
  tl.innerHTML += `
    <div class="tl-item">
      <div class="tl-left">
        <div class="tl-dot" style="background:${colorMap[ev.type]}22;color:${colorMap[ev.type]};">
          <i class="${iconMap[ev.type]}"></i>
        </div>
        ${!isLast ? `<div class="tl-line ${i < events.length-3 ? 'active' : ''}"></div>` : ''}
      </div>
      <div class="tl-content">
        <div class="tl-time">${ev.time}</div>
        <div class="tl-card ${ev.card}">
          <div class="tl-title">${ev.title}</div>
          <div class="tl-sub">${ev.sub}</div>
          ${ev.extra ? `<div style="margin-top:6px;">${ev.extra}</div>` : ''}
        </div>
      </div>
    </div>`;
});
</script>
</body>
</html>
