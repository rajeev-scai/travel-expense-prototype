<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // GitHub Pages SPA redirect: preserve path and query in sessionStorage, then go to root
    var l = window.location;
    sessionStorage.setItem('spa_redirect', l.pathname.slice(1) + l.search + l.hash);
    l.replace(l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') + '/?p=1');
  </script>
</head>
<body></body>
</html>
